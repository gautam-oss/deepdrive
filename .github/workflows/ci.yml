name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.14"
  DJANGO_SETTINGS_MODULE: config.settings.local

jobs:
  # -------------------------------------------------------------------------
  # Lint — fast, no DB needed
  # -------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install ruff==0.9.10

      - name: ruff check
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

  # -------------------------------------------------------------------------
  # Security scan — dependency vulnerabilities
  # -------------------------------------------------------------------------
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit -r requirements/base.txt

  # -------------------------------------------------------------------------
  # Test — requires Postgres + Redis
  # -------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: healthcare_saas_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "True"
      ALLOWED_HOSTS: localhost
      DB_NAME: healthcare_saas_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: "5432"
      REDIS_URL: redis://localhost:6379/0
      EMAIL_BACKEND: django.core.mail.backends.locmem.EmailBackend
      DEFAULT_FROM_EMAIL: noreply@test.com
      SENTRY_DSN: ""
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      # Fernet key for CI — use the repo secret when available, otherwise
      # fall back to a hardcoded test key so the suite runs on forks/PRs
      # without secrets configured.
      FIELD_ENCRYPTION_KEY: ${{ secrets.CI_FIELD_ENCRYPTION_KEY || 'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=' }}
      BASE_DOMAIN: localhost

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install --prefer-binary -r requirements/local.txt

      - name: Django system check (dev settings)
        run: python manage.py check

      - name: Django deploy check (production settings)
        env:
          DJANGO_SETTINGS_MODULE: config.settings.production
          DEBUG: "False"
          ALLOWED_HOSTS: "yourapp.com"
        # --fail-level WARNING catches most misconfiguration.
        # Silence HSTS/SSL warnings that require a real domain in CI.
        run: python manage.py check --deploy --fail-level ERROR

      - name: Run migrations (shared schema)
        run: python manage.py migrate_schemas --shared

      - name: Run tests
        run: |
          python -m pytest \
            --cov=apps \
            --cov-report=xml \
            --cov-report=term-missing \
            -v \
            --tb=short

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # -------------------------------------------------------------------------
  # Build Docker image — only on main
  # -------------------------------------------------------------------------
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push — validates Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: healthcare-saas:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DJANGO_SETTINGS_MODULE=config.settings.production
