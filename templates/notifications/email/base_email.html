<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; padding: 0; background: #f5f5f5; font-family: system-ui, -apple-system, sans-serif; color: #333; }
    .wrapper { max-width: 600px; margin: 2rem auto; background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; }
    .header { background: #1e3a5f; padding: 1.5rem 2rem; }
    .header h1 { margin: 0; color: #fff; font-size: 1.2rem; font-weight: 600; }
    .body { padding: 2rem; }
    .body p { margin: 0 0 1rem; line-height: 1.6; }
    .detail-box { background: #f8f9fa; border-left: 4px solid #1e3a5f; padding: 1rem 1.25rem; margin: 1.25rem 0; border-radius: 0 4px 4px 0; }
    .detail-row { display: flex; justify-content: space-between; padding: 0.25rem 0; font-size: 0.9rem; }
    .detail-label { color: #666; }
    .detail-value { font-weight: 600; }
    .btn { display: inline-block; background: #1e3a5f; color: #fff; padding: 0.65rem 1.5rem; border-radius: 4px; text-decoration: none; font-weight: 600; margin-top: 0.5rem; }
    .footer { background: #f8f9fa; padding: 1rem 2rem; font-size: 0.8rem; color: #888; border-top: 1px solid #e0e0e0; text-align: center; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>{% block header %}ClinicOS{% endblock %}</h1>
    </div>
    <div class="body">
      {% block content %}{% endblock %}
    </div>
    <div class="footer">
      {% block footer %}
      This email was sent by ClinicOS. Please do not reply to this message.<br>
      If you have questions, contact your clinic directly.
      {% endblock %}
    </div>
  </div>
</body>
</html>
